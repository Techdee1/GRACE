services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grace_backend
    restart: unless-stopped
    environment:
      POSTGRES_URL: postgresql+psycopg://grace:grace@postgres:5432/grace
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: grace_password
      GROQ_MODEL: llama-3.3-70b-versatile
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LUA_TRANSACTION_INTAKE_WEBHOOK_URL: ${LUA_TRANSACTION_INTAKE_WEBHOOK_URL:-}
      LUA_TRANSACTION_INTAKE_KEY: ${LUA_TRANSACTION_INTAKE_KEY:-}
      LUA_TRANSACTION_INTAKE_BEARER_TOKEN: ${LUA_TRANSACTION_INTAKE_BEARER_TOKEN:-}
      LUA_TRANSACTION_INTAKE_TIMEOUT_SECONDS: ${LUA_TRANSACTION_INTAKE_TIMEOUT_SECONDS:-30}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ingest_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grace_ingest_worker
    restart: unless-stopped
    command: ["python", "-m", "app.workers.ingest_worker"]
    environment:
      POSTGRES_URL: postgresql+psycopg://grace:grace@postgres:5432/grace
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: grace_password
      GROQ_MODEL: llama-3.3-70b-versatile
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LUA_TRANSACTION_INTAKE_WEBHOOK_URL: ${LUA_TRANSACTION_INTAKE_WEBHOOK_URL:-}
      LUA_TRANSACTION_INTAKE_KEY: ${LUA_TRANSACTION_INTAKE_KEY:-}
      LUA_TRANSACTION_INTAKE_BEARER_TOKEN: ${LUA_TRANSACTION_INTAKE_BEARER_TOKEN:-}
      LUA_TRANSACTION_INTAKE_TIMEOUT_SECONDS: ${LUA_TRANSACTION_INTAKE_TIMEOUT_SECONDS:-30}
      INGEST_WORKER_POLL_TIMEOUT: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app

  postgres:
    image: postgres:16-alpine
    container_name: grace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grace
      POSTGRES_USER: grace
      POSTGRES_PASSWORD: grace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grace -d grace"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grace_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: grace_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/grace_password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p grace_password 'RETURN 1;' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grace_seed
    restart: "no"
    command: ["python", "scripts/seed.py"]
    environment:
      POSTGRES_URL: postgresql+psycopg://grace:grace@postgres:5432/grace
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: grace_password
      GROQ_MODEL: llama-3.3-70b-versatile
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      API_BASE_URL: http://backend:8000/api/v1
      SEED_DATA_DIR: /data/synthetic
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./scripts:/app/scripts

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
